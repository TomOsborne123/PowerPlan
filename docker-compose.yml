services:
  db:
    image: mysql:8.4
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: powerplan
      MYSQL_DATABASE: energy_tariff
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ppowerplan"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "5001"
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: powerplan
      DB_NAME: energy_tariff
    ports:
      - "5001:5001"

volumes:
  db_data:

